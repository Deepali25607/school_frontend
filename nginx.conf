# For WebSocket upgrade through proxy. Lives at http{} scope; required
# because nginx doesn't auto-derive `Connection: upgrade` from $http_upgrade.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # gzip for static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend container (resolved via docker DNS).
    # `Upgrade` + `Connection: upgrade` are required so the WebSocket handshake
    # on /api/realtime survives the hop through nginx.
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep idle WS connections alive for the heartbeat
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Long cache for fingerprinted Vite assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
